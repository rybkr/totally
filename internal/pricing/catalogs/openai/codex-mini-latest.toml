# Bundled OpenAI API-equivalent price card.
schema_version = 1

[model]
provider = "openai"
id = "codex-mini-latest"

[[schedules]]
effective_from = "2025-05-16"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/models/codex-mini-latest"
source_retrieved_at = "2026-07-11"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "1.50"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.375"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "6.00"
