# Bundled OpenAI API-equivalent price card.
schema_version = 1

[model]
provider = "openai"
id = "o3"

[[schedules]]
effective_from = "2025-04-16"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/models/o3"
source_retrieved_at = "2026-07-11"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "2.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.50"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "8.00"

[[schedules]]
effective_from = "2025-04-16"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/pricing"
source_retrieved_at = "2026-07-16"

[schedules.selector]
processing_mode = "batch"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "1.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.25"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "4.00"
