# Bundled OpenAI API-equivalent price card.
schema_version = 1

[model]
provider = "openai"
id = "o4-mini"

[[schedules]]
effective_from = "2025-04-16"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/models/o4-mini"
source_retrieved_at = "2026-07-11"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "1.10"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.275"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "4.40"
