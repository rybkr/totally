# Bundled OpenAI API-equivalent price card.
schema_version = 1

[model]
provider = "openai"
id = "gpt-5.4-mini"

[[schedules]]
effective_from = "2026-03-17"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/models/gpt-5.4-mini"
source_retrieved_at = "2026-07-12"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "0.75"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.075"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "4.50"
