# Bundled OpenAI API-equivalent price card.
schema_version = 1

[model]
provider = "openai"
id = "gpt-5.1"

[[schedules]]
effective_from = "2025-11-13"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/models/gpt-5.1"
source_retrieved_at = "2026-07-11"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "1.25"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.125"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "10.00"
