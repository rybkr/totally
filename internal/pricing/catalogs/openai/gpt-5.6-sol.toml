# Bundled OpenAI API-equivalent price card.
schema_version = 1

[model]
provider = "openai"
id = "gpt-5.6-sol"

[[schedules]]
effective_from = "2026-07-09"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/models/gpt-5.6-sol"
source_retrieved_at = "2026-07-12"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "5.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.50"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "30.00"

[[schedules.adjustments]]
kind = "threshold_multiplier"
scope = "request"
measure = "total_input_tokens"
operator = "gt"
threshold = 272000

[[schedules.adjustments.targets]]
meter = "input_tokens"
multiplier = "2"

[[schedules.adjustments.targets]]
meter = "cached_input_tokens"
multiplier = "2"

[[schedules.adjustments.targets]]
meter = "output_tokens"
multiplier = "1.5"

[[schedules.adjustments.targets]]
meter = "cache_write_tokens"
multiplier = "2"

[[schedules.rates]]
meter = "cache_write_tokens"
unit = "million_tokens"
price = "6.25"
