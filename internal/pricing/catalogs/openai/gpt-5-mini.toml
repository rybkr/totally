# Bundled OpenAI API-equivalent price card.
schema_version = 1

[model]
provider = "openai"
id = "gpt-5-mini"

[[schedules]]
effective_from = "2025-08-07"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/models/gpt-5-mini"
source_retrieved_at = "2026-07-11"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "0.25"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.025"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "2.00"

[[schedules]]
effective_from = "2025-08-07"
basis = "api_equivalent"
currency = "USD"
source_url = "https://developers.openai.com/api/docs/pricing"
source_retrieved_at = "2026-07-16"

[schedules.selector]
processing_mode = "batch"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "0.125"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.0125"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "1.00"
