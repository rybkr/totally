# Bundled Anthropic API-equivalent price card.
schema_version = 1

[model]
provider = "anthropic"
id = "claude-sonnet-5"

# Introductory pricing period: 2026-06-30 (release) through 2026-08-31 inclusive.
[[schedules]]
effective_from = "2026-06-30"
effective_until = "2026-09-01"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/about-claude/pricing"
source_retrieved_at = "2026-07-16"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "2.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.20"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "2.50"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "4.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "10.00"

[[schedules.rates]]
meter = "web_search_requests"
unit = "thousand_requests"
price = "10.00"

[[schedules.rates]]
meter = "web_fetch_requests"
unit = "thousand_requests"
price = "0"

# Introductory period, Batch API (50% discount on token meters).
[[schedules]]
effective_from = "2026-06-30"
