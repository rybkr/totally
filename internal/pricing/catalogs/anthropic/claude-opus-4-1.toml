# Bundled Anthropic API-equivalent price card.
# 200k-token context window (not 1M) — no long-context premium concept
# applies, and none is published for this model. Model is deprecated and
# scheduled to retire 2026-08-05; pricing below is the current published
# rate up to that date.
schema_version = 1

[model]
provider = "anthropic"
id = "claude-opus-4-1"

[[schedules]]
effective_from = "2025-08-05"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/about-claude/pricing"
source_retrieved_at = "2026-07-16"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "15.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "1.50"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "18.75"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "30.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "75.00"

[[schedules.rates]]
meter = "web_search_requests"
unit = "thousand_requests"
price = "10.00"

[[schedules.rates]]
meter = "web_fetch_requests"
unit = "thousand_requests"
price = "0"

# Message Batches API: 50% off every token meter (input, output, cache write,
# cache read); prompt-caching multipliers apply on top of the batch-discounted
# base rate per the source, which materializes to exactly half of every
# standard-schedule token rate above.
[[schedules]]
effective_from = "2025-08-05"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/about-claude/pricing"
source_retrieved_at = "2026-07-16"

[schedules.selector]
processing_mode = "batch"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "7.50"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.75"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "9.375"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "15.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "37.50"
