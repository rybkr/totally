# Bundled Anthropic API-equivalent price card.
schema_version = 1

[model]
provider = "anthropic"
id = "claude-opus-4-7"

[[schedules]]
effective_from = "2026-04-16"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/about-claude/pricing"
source_retrieved_at = "2026-07-16"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "5.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.50"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "6.25"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "10.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "25.00"

[[schedules.rates]]
meter = "web_search_requests"
unit = "thousand_requests"
price = "10.00"

[[schedules.rates]]
meter = "web_fetch_requests"
unit = "thousand_requests"
price = "0"

# 1M-token context window at standard pricing, no long-context premium
# (source explicitly lists Opus 4.7 among the models with no such premium).

# Message Batches API: 50% off every token meter (input, output, cache write,
# cache read); prompt-caching multipliers apply on top of the batch-discounted
# base rate per the source, which materializes to exactly half of every
# standard-schedule token rate above.
[[schedules]]
effective_from = "2026-04-16"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/about-claude/pricing"
source_retrieved_at = "2026-07-16"

[schedules.selector]
processing_mode = "batch"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "2.50"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.25"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "3.125"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "5.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "12.50"

# Fast mode (research preview): premium input/output pricing, applied across
# the full context window. Deprecated as of 2026-06-25; removed 2026-07-24
# (requests with speed:"fast" error after removal, so this schedule ends then).
# Prompt-caching multipliers stack on top of fast mode's base rate per the
# source, so cache meters here are fast-mode input times the same 1.25x / 2x /
# 0.1x multipliers used on the standard schedule.
[[schedules]]
effective_from = "2026-04-16"
effective_until = "2026-07-24"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/build-with-claude/fast-mode"
source_retrieved_at = "2026-07-16"

[schedules.selector]
processing_mode = "fast"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "30.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "3.00"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "37.50"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "60.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "150.00"
