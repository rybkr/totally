# Bundled Anthropic API-equivalent price card.
schema_version = 1

[model]
provider = "anthropic"
id = "claude-haiku-4-5"

[[schedules]]
effective_from = "2025-10-15"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/about-claude/pricing"
source_retrieved_at = "2026-07-16"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "1.00"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.10"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "1.25"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "2.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "5.00"

[[schedules.rates]]
meter = "web_search_requests"
unit = "thousand_requests"
price = "10.00"

[[schedules.rates]]
meter = "web_fetch_requests"
unit = "thousand_requests"
price = "0"

# Batch API (50% discount on token meters).
[[schedules]]
effective_from = "2025-10-15"
basis = "api_equivalent"
currency = "USD"
source_url = "https://platform.claude.com/docs/en/about-claude/pricing"
source_retrieved_at = "2026-07-16"

[schedules.selector]
processing_mode = "batch"

[[schedules.rates]]
meter = "input_tokens"
unit = "million_tokens"
price = "0.50"

[[schedules.rates]]
meter = "cached_input_tokens"
unit = "million_tokens"
price = "0.05"

[[schedules.rates]]
meter = "cache_write_5m_tokens"
unit = "million_tokens"
price = "0.625"

[[schedules.rates]]
meter = "cache_write_1h_tokens"
unit = "million_tokens"
price = "1.00"

[[schedules.rates]]
meter = "output_tokens"
unit = "million_tokens"
price = "2.50"
